<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>RTK Tracker Pro</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/854/854878.png">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0e17;
            --card: rgba(14, 20, 33, 0.92);
            --border: rgba(56, 189, 248, 0.15);
            --accent: #38bdf8;
            --accent2: #818cf8;
            --success: #34d399;
            --danger: #f87171;
            --warning: #fbbf24;
            --text: #e2e8f0;
            --text-dim: #64748b;
            --glow: 0 0 20px rgba(56, 189, 248, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; font-family: 'Outfit', sans-serif; overflow: hidden; background: var(--bg); }
        #map { height: 100vh; width: 100%; position: absolute; z-index: 1; }

        /* Dashboard */
        .dashboard {
            position: absolute; top: 12px; left: 12px; z-index: 1000;
            width: 280px; background: var(--card);
            backdrop-filter: blur(20px); border-radius: 16px;
            box-shadow: var(--glow), 0 8px 32px rgba(0,0,0,0.5);
            padding: 16px; border: 1px solid var(--border);
            max-height: calc(100vh - 24px); overflow-y: auto;
            scrollbar-width: none;
        }
        .dashboard::-webkit-scrollbar { display: none; }

        .logo {
            display: flex; align-items: center; gap: 8px;
            margin-bottom: 12px; padding-bottom: 10px;
            border-bottom: 1px solid var(--border);
        }
        .logo-icon {
            width: 32px; height: 32px; border-radius: 8px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            display: flex; align-items: center; justify-content: center;
            font-size: 16px; flex-shrink: 0;
        }
        .logo h2 {
            font-size: 15px; color: var(--text); font-weight: 700;
            letter-spacing: -0.3px;
        }
        .logo small { font-size: 10px; color: var(--text-dim); font-weight: 400; }

        /* Connection status */
        .conn-bar {
            display: flex; align-items: center; gap: 6px;
            padding: 8px 10px; border-radius: 8px;
            background: rgba(255,255,255,0.03); margin-bottom: 10px;
            border: 1px solid var(--border); font-size: 12px; color: var(--text-dim);
        }
        .conn-dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: var(--danger); flex-shrink: 0;
            transition: background 0.3s;
        }
        .conn-dot.online { background: var(--success); box-shadow: 0 0 8px rgba(52,211,153,0.5); }
        .conn-dot.syncing { background: var(--warning); animation: pulse 1s infinite; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* Status badge */
        .status-badge {
            padding: 8px 12px; border-radius: 8px;
            font-weight: 600; font-size: 12px; margin-bottom: 10px;
            text-align: center; color: var(--text);
            background: rgba(255,255,255,0.04); border: 1px solid var(--border);
            transition: all 0.3s;
        }
        .status-badge.recording {
            background: rgba(52, 211, 153, 0.1);
            border-color: rgba(52, 211, 153, 0.3);
            color: var(--success);
        }
        .status-badge.stopped {
            background: rgba(248, 113, 113, 0.1);
            border-color: rgba(248, 113, 113, 0.3);
            color: var(--danger);
        }

        /* Buttons */
        .btn-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px; }
        .btn-row { display: flex; gap: 5px; }
        .btn-row button { flex: 1; }

        button {
            border: none; padding: 10px 8px; border-radius: 8px;
            font-weight: 600; cursor: pointer; color: white; font-size: 12px;
            font-family: 'Outfit', sans-serif;
            transition: all 0.15s; position: relative; overflow: hidden;
        }
        button:active { transform: scale(0.96); }
        button:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

        .btn-start { background: linear-gradient(135deg, #059669, #34d399); }
        .btn-stop { background: linear-gradient(135deg, #dc2626, #f87171); }
        .btn-focus { background: linear-gradient(135deg, #d97706, #fbbf24); color: #1a1a1a; }
        .btn-history { background: linear-gradient(135deg, #2563eb, var(--accent)); }
        .btn-export { background: linear-gradient(135deg, #7c3aed, var(--accent2)); }
        .btn-clear { background: rgba(255,255,255,0.06); border: 1px solid var(--border); color: var(--text-dim); }

        /* Stats */
        .stats {
            font-size: 11px; color: var(--text-dim);
            border-top: 1px solid var(--border); padding-top: 10px;
        }
        .stats-section-title {
            font-size: 10px; text-transform: uppercase; letter-spacing: 1px;
            color: var(--accent); margin-bottom: 6px; font-weight: 600;
        }
        .stats-item {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 4px; padding: 3px 0;
        }
        .stats-item b {
            color: var(--text); font-family: 'JetBrains Mono', monospace;
            font-size: 11px; font-weight: 600;
        }
        .stats-divider { height: 1px; background: var(--border); margin: 8px 0; }

        /* Track info */
        .track-stats {
            margin-top: 8px; padding-top: 8px;
            border-top: 1px solid var(--border);
        }

        /* Export modal */
        .modal-overlay {
            display: none; position: fixed; inset: 0; z-index: 2000;
            background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
            align-items: center; justify-content: center;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 16px; padding: 20px; width: 260px;
            box-shadow: var(--glow);
        }
        .modal h3 { color: var(--text); font-size: 14px; margin-bottom: 12px; }
        .modal button { width: 100%; margin-bottom: 6px; }
        .modal .btn-cancel { background: rgba(255,255,255,0.06); border: 1px solid var(--border); color: var(--text-dim); }

        /* Data counter badge */
        .data-counter {
            position: absolute; top: 12px; right: 12px; z-index: 1000;
            background: var(--card); backdrop-filter: blur(20px);
            border: 1px solid var(--border); border-radius: 12px;
            padding: 10px 14px; box-shadow: var(--glow);
            display: flex; flex-direction: column; align-items: flex-end; gap: 4px;
        }
        .data-counter .counter-row {
            display: flex; align-items: center; gap: 6px; font-size: 11px;
        }
        .counter-label { color: var(--text-dim); }
        .counter-value {
            color: var(--text); font-family: 'JetBrains Mono', monospace;
            font-weight: 600; font-size: 12px;
        }
        .speed-value { color: var(--warning); font-size: 18px; font-weight: 700; }
        .speed-unit { color: var(--text-dim); font-size: 10px; }

        /* Toast notification */
        .toast {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            z-index: 3000; background: var(--card); border: 1px solid var(--border);
            border-radius: 10px; padding: 10px 18px; color: var(--text);
            font-size: 12px; font-weight: 500; box-shadow: var(--glow);
            opacity: 0; transition: opacity 0.3s; pointer-events: none;
        }
        .toast.show { opacity: 1; }

        /* Leaflet overrides */
        .leaflet-control-attribution { display: none !important; }
        .leaflet-control-zoom { display: none !important; }

        @media (max-width: 400px) {
            .dashboard { width: calc(100% - 24px); }
            .data-counter { right: 12px; }
        }
    </style>
</head>
<body>

<div class="dashboard" id="dashboard">
    <div class="logo">
        <div class="logo-icon">🛰</div>
        <div>
            <h2>RTK Tracker</h2>
            <small>Real-time kinematic GPS</small>
        </div>
    </div>

    <div class="conn-bar">
        <div class="conn-dot" id="connDot"></div>
        <span id="connText">Ulanmoqda...</span>
    </div>

    <div class="status-badge" id="statusBox">
        <span id="stateText">Tizim tayyor</span>
    </div>

    <div class="btn-group">
        <div class="btn-row">
            <button class="btn-start" id="btnStart">▶ Boshlash</button>
            <button class="btn-stop" id="btnStop" disabled>⏹ To'xtatish</button>
        </div>
        <div class="btn-row">
            <button class="btn-focus" id="btnFindMe">📍 Fokus</button>
            <button class="btn-history" id="btnHistory">📜 Tarix</button>
        </div>
        <div class="btn-row">
            <button class="btn-export" id="btnExport">📤 Eksport</button>
            <button class="btn-clear" id="btnClear">♻ Tozalash</button>
        </div>
    </div>

    <div class="stats">
        <div class="stats-section-title">GPS Ma'lumotlari</div>
        <div class="stats-item"><span>Yo'ldoshlar (Fix):</span> <b id="satVal">—</b></div>
        <div class="stats-item"><span>Latitude:</span> <b id="latVal">—</b></div>
        <div class="stats-item"><span>Longitude:</span> <b id="lngVal">—</b></div>
        <div class="stats-item"><span>Aniqlik (m):</span> <b id="accVal">—</b></div>
        <div class="stats-item"><span>Oxirgi yangilanish:</span> <b id="lastUpdate">—</b></div>

        <div class="stats-divider"></div>
        <div class="stats-section-title">Trek statistikasi</div>
        <div class="stats-item"><span>Nuqtalar soni:</span> <b id="pointCount">0</b></div>
        <div class="stats-item"><span>Masofa:</span> <b id="totalDist">0 m</b></div>
        <div class="stats-item"><span>Davomiylik:</span> <b id="duration">00:00:00</b></div>
        <div class="stats-item"><span>Tezlik:</span> <b id="speedVal">0 km/h</b></div>
    </div>
</div>

<!-- Speed overlay -->
<div class="data-counter" id="dataCounter">
    <div class="counter-row">
        <span class="speed-value" id="bigSpeed">0</span>
        <span class="speed-unit">km/h</span>
    </div>
    <div class="counter-row">
        <span class="counter-label">Nuqtalar:</span>
        <span class="counter-value" id="bigPoints">0</span>
    </div>
</div>

<div id="map"></div>

<!-- Export modal -->
<div class="modal-overlay" id="exportModal">
    <div class="modal">
        <h3>📤 Ma'lumotni eksport qilish</h3>
        <button class="btn-export" id="exportGeoJSON">GeoJSON formatda</button>
        <button class="btn-history" id="exportCSV">CSV formatda</button>
        <button class="btn-focus" id="exportGPX">GPX formatda</button>
        <button class="btn-cancel" id="exportCancel">Bekor qilish</button>
    </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
(function() {
    'use strict';

    // =================== CONFIG ===================
    const FIREBASE_URL = "https://gps-trackker-default-rtdb.europe-west1.firebasedatabase.app/";
    const DEFAULT_CENTER = [39.65, 66.95];
    const DEFAULT_ZOOM = 16;
    const HISTORY_LIMIT = 500;
    const MIN_DISTANCE_THRESHOLD = 0.3; // metr — juda yaqin nuqtalarni filtrlash
    const DATA_SYNC_INTERVAL = 2000; // ms — buferdan yuborish oralig'i

    // =================== STATE ===================
    let isTracking = false;
    let lastPos = null;
    let prevPos = null;
    let prevTime = null;
    let trackPoints = [];
    let trackStartTime = null;
    let totalDistance = 0;
    let currentSpeed = 0;
    let isConnected = false;
    let dataBuffer = [];
    let reconnectAttempts = 0;
    let durationTimer = null;
    let lastDataTime = 0;

    // =================== FIREBASE ===================
    const firebaseConfig = { databaseURL: FIREBASE_URL };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Connection monitoring
    db.ref('.info/connected').on('value', (snap) => {
        isConnected = snap.val() === true;
        updateConnectionUI();
        if (isConnected) {
            reconnectAttempts = 0;
            flushBuffer();
        }
    });

    function updateConnectionUI() {
        const dot = document.getElementById('connDot');
        const text = document.getElementById('connText');
        if (isConnected) {
            dot.className = 'conn-dot online';
            text.textContent = 'Firebase ulangan';
        } else {
            dot.className = 'conn-dot';
            text.textContent = 'Ulanish yo\'q...';
        }
    }

    // =================== MAP ===================
    const map = L.map('map', {
        zoomControl: false,
        attributionControl: false
    }).setView(DEFAULT_CENTER, DEFAULT_ZOOM);

    // Satellite + labels
    L.tileLayer('https://{s}.google.com/vt/lyrs=s,h&x={x}&y={y}&z={z}', {
        maxZoom: 22,
        subdomains: ['mt0','mt1','mt2','mt3']
    }).addTo(map);

    // Marker — pulsating
    const markerIcon = L.divIcon({
        className: '',
        html: `<div style="
            width: 18px; height: 18px; border-radius: 50%;
            background: #38bdf8; border: 3px solid white;
            box-shadow: 0 0 12px rgba(56,189,248,0.6), 0 0 30px rgba(56,189,248,0.2);
            position: relative;
        "><div style="
            position: absolute; inset: -8px; border-radius: 50%;
            border: 2px solid rgba(56,189,248,0.4);
            animation: ping 1.5s cubic-bezier(0,0,0.2,1) infinite;
        "></div></div>
        <style>@keyframes ping { 75%, 100% { transform: scale(2); opacity: 0; } }</style>`,
        iconSize: [18, 18],
        iconAnchor: [9, 9]
    });
    let marker = L.marker([0, 0], { icon: markerIcon }).addTo(map);

    // Polylines
    let polyline = L.polyline([], {
        color: '#34d399', weight: 4, opacity: 0.9,
        lineJoin: 'round', lineCap: 'round'
    }).addTo(map);

    let historyLine = L.polyline([], {
        color: '#fbbf24', weight: 3, opacity: 0.6,
        dashArray: '8, 12', lineJoin: 'round'
    }).addTo(map);

    // =================== UTILS ===================
    function haversine(lat1, lon1, lat2, lon2) {
        const R = 6371000;
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2)**2 +
                  Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                  Math.sin(dLon/2)**2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    function formatDistance(meters) {
        if (meters >= 1000) return (meters / 1000).toFixed(2) + ' km';
        return meters.toFixed(1) + ' m';
    }

    function formatDuration(ms) {
        const s = Math.floor(ms / 1000);
        const h = Math.floor(s / 3600);
        const m = Math.floor((s % 3600) / 60);
        const sec = s % 60;
        return [h, m, sec].map(v => String(v).padStart(2, '0')).join(':');
    }

    function showToast(msg, duration = 2500) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), duration);
    }

    // =================== DATA BUFFER (offline support) ===================
    function addToBuffer(point) {
        dataBuffer.push(point);
    }

    function flushBuffer() {
        if (dataBuffer.length === 0 || !isConnected) return;
        const batch = [...dataBuffer];
        dataBuffer = [];
        batch.forEach(pt => {
            db.ref('/history').push(pt).catch(() => {
                dataBuffer.push(pt); // qayta qo'shish
            });
        });
    }

    // Har DATA_SYNC_INTERVAL ms da buferni yuborish
    setInterval(flushBuffer, DATA_SYNC_INTERVAL);

    // =================== REAL-TIME DATA LISTENER ===================
    db.ref("/current_pos").on("value", (snap) => {
        const data = snap.val();
        if (!data) return;

        const now = Date.now();
        const lat = parseFloat(data.lat);
        const lng = parseFloat(data.lng);

        if (isNaN(lat) || isNaN(lng)) return;

        lastPos = [lat, lng];
        marker.setLatLng(lastPos);

        // Update GPS info
        document.getElementById('latVal').textContent = lat.toFixed(7);
        document.getElementById('lngVal').textContent = lng.toFixed(7);
        document.getElementById('satVal').textContent = data.fix || data.satellites || '—';
        document.getElementById('accVal').textContent = data.accuracy ? parseFloat(data.accuracy).toFixed(2) : '—';
        document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString('uz');

        // Tracking logic
        if (isTracking) {
            // Distance filter
            if (prevPos) {
                const dist = haversine(prevPos[0], prevPos[1], lat, lng);
                if (dist < MIN_DISTANCE_THRESHOLD) return; // juda yaqin — skip

                totalDistance += dist;

                // Speed calculation
                const dt = (now - prevTime) / 1000;
                if (dt > 0) {
                    currentSpeed = (dist / dt) * 3.6; // km/h
                }
            }

            prevPos = [lat, lng];
            prevTime = now;

            const point = {
                lat: lat,
                lng: lng,
                fix: data.fix || null,
                accuracy: data.accuracy || null,
                timestamp: now
            };

            trackPoints.push(point);
            polyline.addLatLng(lastPos);
            map.panTo(lastPos);

            // Buffer for Firebase
            addToBuffer(point);

            // Update UI
            updateTrackStats();
        }

        lastDataTime = now;
    }, (error) => {
        console.error('Firebase read error:', error);
        updateConnectionUI();
        showToast('⚠ Ma\'lumot olishda xatolik');
    });

    // =================== TRACKING CONTROLS ===================
    function startTracking() {
        isTracking = true;
        trackStartTime = Date.now();
        trackPoints = [];
        totalDistance = 0;
        currentSpeed = 0;
        prevPos = null;
        prevTime = null;
        polyline.setLatLngs([]);

        document.getElementById('btnStart').disabled = true;
        document.getElementById('btnStop').disabled = false;

        const badge = document.getElementById('statusBox');
        badge.className = 'status-badge recording';
        document.getElementById('stateText').textContent = '● Yozilmoqda...';

        durationTimer = setInterval(() => {
            if (trackStartTime) {
                document.getElementById('duration').textContent = formatDuration(Date.now() - trackStartTime);
            }
        }, 1000);

        showToast('✅ Trek boshlandi');
    }

    function stopTracking() {
        isTracking = false;
        clearInterval(durationTimer);

        document.getElementById('btnStart').disabled = false;
        document.getElementById('btnStop').disabled = true;

        const badge = document.getElementById('statusBox');
        badge.className = 'status-badge stopped';
        document.getElementById('stateText').textContent = 'To\'xtatildi';

        currentSpeed = 0;
        updateTrackStats();
        flushBuffer();

        showToast(`⏹ Trek to'xtatildi — ${trackPoints.length} nuqta`);
    }

    function updateTrackStats() {
        document.getElementById('pointCount').textContent = trackPoints.length;
        document.getElementById('totalDist').textContent = formatDistance(totalDistance);
        document.getElementById('speedVal').textContent = currentSpeed.toFixed(1) + ' km/h';

        document.getElementById('bigSpeed').textContent = Math.round(currentSpeed);
        document.getElementById('bigPoints').textContent = trackPoints.length;
    }

    // =================== HISTORY ===================
    function loadHistory() {
        showToast('📡 Tarix yuklanmoqda...');
        db.ref("/history").limitToLast(HISTORY_LIMIT).once("value", (snap) => {
            const data = snap.val();
            if (data) {
                const points = Object.values(data);
                const path = points
                    .filter(pt => pt.lat && pt.lng)
                    .map(pt => [parseFloat(pt.lat), parseFloat(pt.lng)]);

                historyLine.setLatLngs(path);
                if (path.length > 1) {
                    map.fitBounds(historyLine.getBounds(), { padding: [30, 30] });
                }
                showToast(`📜 ${path.length} nuqta yuklandi`);
            } else {
                showToast('Tarix topilmadi');
            }
        }).catch(() => {
            showToast('⚠ Tarixni yuklashda xatolik');
        });
    }

    // =================== EXPORT ===================
    function exportGeoJSON() {
        if (trackPoints.length === 0) { showToast('Trek bo\'sh'); return; }
        const geojson = {
            type: "FeatureCollection",
            features: [{
                type: "Feature",
                geometry: {
                    type: "LineString",
                    coordinates: trackPoints.map(p => [p.lng, p.lat])
                },
                properties: {
                    points: trackPoints.length,
                    distance_m: totalDistance,
                    created: new Date().toISOString()
                }
            },
            ...trackPoints.map((p, i) => ({
                type: "Feature",
                geometry: { type: "Point", coordinates: [p.lng, p.lat] },
                properties: { index: i, fix: p.fix, accuracy: p.accuracy, time: p.timestamp }
            }))]
        };
        downloadFile(JSON.stringify(geojson, null, 2), 'trek_' + dateStamp() + '.geojson', 'application/json');
        showToast('✅ GeoJSON saqlandi');
    }

    function exportCSV() {
        if (trackPoints.length === 0) { showToast('Trek bo\'sh'); return; }
        let csv = 'index,latitude,longitude,fix,accuracy,timestamp,datetime\n';
        trackPoints.forEach((p, i) => {
            csv += `${i},${p.lat},${p.lng},${p.fix || ''},${p.accuracy || ''},${p.timestamp},${new Date(p.timestamp).toISOString()}\n`;
        });
        downloadFile(csv, 'trek_' + dateStamp() + '.csv', 'text/csv');
        showToast('✅ CSV saqlandi');
    }

    function exportGPX() {
        if (trackPoints.length === 0) { showToast('Trek bo\'sh'); return; }
        let gpx = `<?xml version="1.0" encoding="UTF-8"?>
<gpx version="1.1" creator="RTK Tracker Pro">
  <trk><name>RTK Trek ${dateStamp()}</name><trkseg>
`;
        trackPoints.forEach(p => {
            gpx += `    <trkpt lat="${p.lat}" lon="${p.lng}"><time>${new Date(p.timestamp).toISOString()}</time>${p.fix ? '<fix>'+p.fix+'</fix>' : ''}</trkpt>\n`;
        });
        gpx += `  </trkseg></trk>\n</gpx>`;
        downloadFile(gpx, 'trek_' + dateStamp() + '.gpx', 'application/gpx+xml');
        showToast('✅ GPX saqlandi');
    }

    function downloadFile(content, filename, type) {
        const blob = new Blob([content], { type });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = filename;
        a.click();
        URL.revokeObjectURL(a.href);
    }

    function dateStamp() {
        return new Date().toISOString().slice(0, 19).replace(/[T:]/g, '-');
    }

    // =================== EVENT LISTENERS ===================
    document.getElementById('btnStart').onclick = startTracking;
    document.getElementById('btnStop').onclick = stopTracking;
    document.getElementById('btnFindMe').onclick = () => {
        if (lastPos) map.flyTo(lastPos, 19, { duration: 0.8 });
        else showToast('GPS ma\'lumoti yo\'q');
    };
    document.getElementById('btnHistory').onclick = loadHistory;

    document.getElementById('btnClear').onclick = () => {
        polyline.setLatLngs([]);
        historyLine.setLatLngs([]);
        trackPoints = [];
        totalDistance = 0;
        currentSpeed = 0;
        updateTrackStats();
        showToast('♻ Tozalandi');
    };

    // Export modal
    document.getElementById('btnExport').onclick = () => {
        document.getElementById('exportModal').classList.add('active');
    };
    document.getElementById('exportCancel').onclick = () => {
        document.getElementById('exportModal').classList.remove('active');
    };
    document.getElementById('exportGeoJSON').onclick = () => {
        exportGeoJSON();
        document.getElementById('exportModal').classList.remove('active');
    };
    document.getElementById('exportCSV').onclick = () => {
        exportCSV();
        document.getElementById('exportModal').classList.remove('active');
    };
    document.getElementById('exportGPX').onclick = () => {
        exportGPX();
        document.getElementById('exportModal').classList.remove('active');
    };

    // Close modal on outside click
    document.getElementById('exportModal').onclick = (e) => {
        if (e.target === e.currentTarget) {
            document.getElementById('exportModal').classList.remove('active');
        }
    };

    // =================== DATA STALE DETECTOR ===================
    setInterval(() => {
        if (lastDataTime && Date.now() - lastDataTime > 10000) {
            const dot = document.getElementById('connDot');
            dot.className = 'conn-dot syncing';
            document.getElementById('connText').textContent = 'Ma\'lumot kutilmoqda...';
        }
    }, 5000);

    // Initial state
    updateConnectionUI();
    updateTrackStats();

})();
</script>
</body>
</html>
